server {
    listen 80;
    server_name sensorhub.local;

    root /var/www/sensorhub;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /air/ {
        alias /var/www/sensorhub/air/;
        index index.html;
        try_files $uri $uri/ /air/index.html;
    }

    location /pir/ {
        alias /var/www/sensorhub/pir/;
        index index.html;
        try_files $uri $uri/ /pir/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
